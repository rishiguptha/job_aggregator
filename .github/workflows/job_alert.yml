name: Job Alert Scheduler

on:
  schedule:
    # ── Weekdays (Mon-Fri): every 2 hours 8:55AM-8:55PM + 11:54PM CST ──
    - cron: '55 14,16,18,20,22 * * 1-5' # 8:55AM, 10:55AM, 12:55PM, 2:55PM, 4:55PM CST
    - cron: '55 0,2 * * 2-6'            # 6:55PM, 8:55PM CST (Tue-Sat UTC = Mon-Fri CST)
    - cron: '54 5 * * 2-6'              # 11:54PM CST (Tue-Sat UTC = Mon-Fri CST)
    # ── Weekends (Sat-Sun): just 8:55AM + 8:55PM CST ──
    - cron: '55 14 * * 0,6'             # 8:55AM CST Sat & Sun
    - cron: '55 2 * * 0,1'              # 8:55PM CST Sat & Sun (Sun-Mon UTC = Sat-Sun CST)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-job-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Restore seen jobs cache
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs_v2.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Run job alert pipeline
        env:
          JOB_ALERT_SENDER_EMAIL: ${{ secrets.JOB_ALERT_SENDER_EMAIL }}
          JOB_ALERT_SENDER_PASSWORD: ${{ secrets.JOB_ALERT_SENDER_PASSWORD }}
          JOB_ALERT_RECIPIENT_EMAIL: ${{ secrets.JOB_ALERT_RECIPIENT_EMAIL }}
        run: uv run main.py --once

      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_jobs_v2.json
          key: seen-jobs-${{ github.run_id }}
