name: Job Alert Scheduler

on:
  schedule:
    # ── NOTE: GitHub disables scheduled workflows if repository is inactive for 60 days ──
    # ── Weekdays (Mon-Fri): every 2 hours 8:53AM-8:53PM + 11:53PM CST ──
    - cron: '53 14,16,18,20,22 * * 1-5' # 8:53AM, 10:53AM, 12:53PM, 2:53PM, 4:53PM CST
    - cron: '53 0,2 * * 2-6'            # 6:53PM, 8:53PM CST (Tue-Sat UTC = Mon-Fri CST)
    - cron: '53 5 * * 2-6'              # 11:53PM CST (Tue-Sat UTC = Mon-Fri CST)
    # ── Weekends (Sat-Sun): just 8:53AM + 8:53PM CST ──
    - cron: '53 14 * * 0,6'             # 8:53AM CST Sat & Sun
    - cron: '53 2 * * 0,1'              # 8:53PM CST Sat & Sun (Sun-Mon UTC = Sat-Sun CST)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-job-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Restore seen jobs cache
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs_v2.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Run job alert pipeline
        env:
          JOB_ALERT_SENDER_EMAIL: ${{ secrets.JOB_ALERT_SENDER_EMAIL }}
          JOB_ALERT_SENDER_PASSWORD: ${{ secrets.JOB_ALERT_SENDER_PASSWORD }}
          JOB_ALERT_RECIPIENT_EMAIL: ${{ secrets.JOB_ALERT_RECIPIENT_EMAIL }}
        run: uv run main.py --once

      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_jobs_v2.json
          key: seen-jobs-${{ github.run_id }}
