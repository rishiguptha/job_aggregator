name: Job Alert Scheduler

on:
  schedule:
    # ── Weekdays (Mon-Fri): every 2 hours 9AM-9PM + 11:59PM CST ──
    - cron: '0 15,17,19,21,23 * * 1-5'  # 9AM, 11AM, 1PM, 3PM, 5PM CST
    - cron: '0 1,3 * * 2-6'             # 7PM, 9PM CST (Tue-Sat UTC = Mon-Fri CST)
    - cron: '59 5 * * 2-6'              # 11:59PM CST (Tue-Sat UTC = Mon-Fri CST)
    # ── Weekends (Sat-Sun): just 9AM + 9PM CST ──
    - cron: '0 15 * * 0,6'              # 9AM CST Sat & Sun
    - cron: '0 3 * * 0,1'               # 9PM CST Sat & Sun (Sun-Mon UTC = Sat-Sun CST)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-job-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Restore seen jobs cache
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs_v2.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Run job alert pipeline
        env:
          JOB_ALERT_SENDER_EMAIL: ${{ secrets.JOB_ALERT_SENDER_EMAIL }}
          JOB_ALERT_SENDER_PASSWORD: ${{ secrets.JOB_ALERT_SENDER_PASSWORD }}
          JOB_ALERT_RECIPIENT_EMAIL: ${{ secrets.JOB_ALERT_RECIPIENT_EMAIL }}
        run: uv run main.py --once

      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_jobs_v2.json
          key: seen-jobs-${{ github.run_id }}
